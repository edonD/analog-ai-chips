<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VS-1 — Waals Nanotechnologies</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0c0e0c; overflow:hidden; width:100vw; height:100vh; }
  canvas { display:block; }
  #badge {
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    color:rgba(180,220,190,0.28); font:500 11px/2.2 'Courier New',monospace;
    letter-spacing:.12em; text-transform:uppercase; pointer-events:none; white-space:nowrap;
  }
</style>
</head>
<body>
<div id="badge">VS‑1 &nbsp;·&nbsp; Waals Nanotechnologies &nbsp;·&nbsp; TSSOP-16 &nbsp;·&nbsp; 300 µW always-on</div>

<script type="importmap">
{ "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE             from 'three';
import { OrbitControls }      from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace    = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// Dark background — almost black, warm-neutral
{
  const cv = document.createElement('canvas'); cv.width = 2; cv.height = 256;
  const g  = cv.getContext('2d');
  const gr = g.createLinearGradient(0, 0, 0, 256);
  gr.addColorStop(0,   '#18201a');
  gr.addColorStop(0.6, '#0e130f');
  gr.addColorStop(1,   '#080a08');
  g.fillStyle = gr; g.fillRect(0, 0, 2, 256);
  scene.background = new THREE.CanvasTexture(cv);
}

// Env map — neutral studio with warm key patch (essential for metallic leads)
{
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 256;
  const g  = cv.getContext('2d');
  g.fillStyle = '#606060'; g.fillRect(0, 0, 512, 256);
  const top = g.createLinearGradient(0, 0, 0, 165);
  top.addColorStop(0, '#e0e0de'); top.addColorStop(1, '#848484');
  g.fillStyle = top; g.fillRect(0, 0, 512, 165);
  const bot = g.createLinearGradient(0, 165, 0, 256);
  bot.addColorStop(0, '#242424'); bot.addColorStop(1, '#060606');
  g.fillStyle = bot; g.fillRect(0, 165, 512, 91);
  // Warm key light patch
  const kl = g.createRadialGradient(95, 48, 0, 95, 48, 150);
  kl.addColorStop(0, 'rgba(255,252,245,1.0)'); kl.addColorStop(1, 'rgba(255,252,245,0)');
  g.fillStyle = kl; g.fillRect(0, 0, 512, 256);
  // Cool rim fill
  const fl = g.createRadialGradient(420, 90, 0, 420, 90, 85);
  fl.addColorStop(0, 'rgba(205,230,210,0.45)'); fl.addColorStop(1, 'rgba(205,230,210,0)');
  g.fillStyle = fl; g.fillRect(0, 0, 512, 256);
  const t = new THREE.CanvasTexture(cv);
  t.mapping = THREE.EquirectangularReflectionMapping; t.colorSpace = THREE.SRGBColorSpace;
  const pm = new THREE.PMREMGenerator(renderer); pm.compileEquirectangularShader();
  scene.environment = pm.fromEquirectangular(t).texture; t.dispose(); pm.dispose();
}

// ─── Camera — low angle, see top + one long side with leads ──────────────────
const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.01, 100);
camera.position.set(2.2, 1.1, 2.8);
camera.lookAt(0, 0.10, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.055;
controls.target.set(0, 0.10, 0);
controls.minDistance = 0.8; controls.maxDistance = 10;
controls.maxPolarAngle = Math.PI * 0.55;

// ─── Lights ───────────────────────────────────────────────────────────────────
const key = new THREE.DirectionalLight(0xfff9f0, 4.0);
key.position.set(-3, 7, 3);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 18;
key.shadow.camera.left = -2.5; key.shadow.camera.right = 2.5;
key.shadow.camera.top  = 2.5; key.shadow.camera.bottom = -2.5;
key.shadow.bias = -0.0003; key.shadow.normalBias = 0.010;
scene.add(key);

const fill = new THREE.DirectionalLight(0xc8e4cc, 1.4);
fill.position.set(5, 2, -1); scene.add(fill);

const front = new THREE.DirectionalLight(0xf5fff8, 1.0);
front.position.set(1, 2, 6); scene.add(front);

const rim = new THREE.DirectionalLight(0xffffff, 1.6);
rim.position.set(0, 6, -5); scene.add(rim);

const topL = new THREE.DirectionalLight(0xffffff, 1.2);
topL.position.set(0, 10, 0); scene.add(topL);

scene.add(new THREE.AmbientLight(0x182018, 5.0));

// ─── World group — everything rotates together ────────────────────────────────
const world = new THREE.Group();
world.rotation.y = -0.42;
scene.add(world);

// ─── PCB ─────────────────────────────────────────────────────────────────────
// FR4 green substrate
const pcbMat = new THREE.MeshStandardMaterial({
  color:     new THREE.Color(0.055, 0.185, 0.075),
  metalness: 0.02,
  roughness: 0.80,
});
const pcb = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.055, 2.6), pcbMat);
pcb.position.y = -0.028; pcb.receiveShadow = true;
world.add(pcb);

// Solder mask (darker green overlay, slight gloss)
const maskMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(0.038, 0.130, 0.050),
  metalness: 0.0, roughness: 0.65,
  transparent: true, opacity: 0.90,
});
const mask = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.002, 2.6), maskMat);
mask.position.y = 0.001; world.add(mask);

// ─── TSSOP-16 package ─────────────────────────────────────────────────────────
// Real: 5.0 × 4.4 × 1.1 mm  →  scaled ~0.22mm/unit
// Units: PKG_X=1.10, PKG_Z=0.97, PKG_Y=0.24
const PKG_X = 1.10;   // long axis (leads spaced along X)
const PKG_Z = 0.97;   // narrow axis (leads extend from ±Z faces)
const PKG_Y = 0.24;   // height
const PKG_R = 0.010;  // nearly-square corners (TSSOP mold)

const group = new THREE.Group();
world.add(group);

// ── Body — black epoxy mold compound ─────────────────────────────────────────
const bodyMat = new THREE.MeshStandardMaterial({
  color:           new THREE.Color(0.052, 0.052, 0.058),
  metalness:       0.0,
  roughness:       0.86,
  envMapIntensity: 0.25,
});
const body = new THREE.Mesh(new RoundedBoxGeometry(PKG_X, PKG_Y, PKG_Z, 4, PKG_R), bodyMat);
body.position.y = PKG_Y / 2;
body.castShadow = true; body.receiveShadow = true;
group.add(body);

// ── Gull-wing leads — tin (Sn) finish, silver-gray ────────────────────────────
// TSSOP-16: 8 leads per side, 0.65mm pitch → 0.143 units
const N_LEADS = 8;
const PITCH   = 0.143;

const leadMat = new THREE.MeshStandardMaterial({
  color:           new THREE.Color(0.74, 0.74, 0.72),
  metalness:       0.96,
  roughness:       0.16,
  envMapIntensity: 2.5,
});

// Lead dimensions
const LW   = 0.088;    // lead width (along X, the row direction)
const EXIT_Y = PKG_Y * 0.52;   // height lead exits body
const TAB_D  = 0.055;           // horizontal tab out from body
const DROP_H = EXIT_Y - 0.018;  // drop height to near-PCB level
const FOOT_D = 0.130;           // foot extending outward
const TH     = 0.022;           // thickness of all lead segments

const tabGeo  = new THREE.BoxGeometry(LW, TH,    TAB_D);
const dropGeo = new THREE.BoxGeometry(LW, DROP_H, TH);
const footGeo = new THREE.BoxGeometry(LW, TH,    FOOT_D);

// PCB copper pad geometry
const pcbPadMat = new THREE.MeshStandardMaterial({
  color:     new THREE.Color(0.72, 0.50, 0.10),
  metalness: 0.88,
  roughness: 0.22,
});
const pcbPadGeo = new THREE.BoxGeometry(LW * 0.9, 0.003, FOOT_D * 1.1);

for (let i = 0; i < N_LEADS; i++) {
  const x = (i - (N_LEADS - 1) / 2) * PITCH;

  for (const side of [-1, 1]) {
    const zFace   = side * PKG_Z / 2;              // package face Z
    const zTab    = zFace + side * TAB_D / 2;      // tab centre Z
    const zDrop   = zFace + side * (TAB_D + TH / 2);
    const zFoot   = zFace + side * (TAB_D + TH + FOOT_D / 2);

    // 1. Horizontal tab (exits body near mid-height)
    const tab = new THREE.Mesh(tabGeo, leadMat);
    tab.position.set(x, EXIT_Y - TH / 2, zTab);
    group.add(tab);

    // 2. Vertical drop
    const drop = new THREE.Mesh(dropGeo, leadMat);
    drop.position.set(x, EXIT_Y - TH - DROP_H / 2, zDrop);
    group.add(drop);

    // 3. Foot — flat on PCB
    const foot = new THREE.Mesh(footGeo, leadMat);
    foot.position.set(x, TH / 2, zFoot);
    group.add(foot);

    // PCB copper pad under foot
    const pad = new THREE.Mesh(pcbPadGeo, pcbPadMat);
    pad.position.set(x, 0.002, zFoot);
    world.add(pad);  // in world group so pads rotate with chip
  }
}

// ── Top marking — laser-etched on black epoxy ─────────────────────────────────
function buildMarking() {
  const SW = 620, SH = 548;   // match TSSOP-16 aspect ratio (5.0/4.4 ≈ 1.14)
  const cv = document.createElement('canvas'); cv.width = SW; cv.height = SH;
  const g  = cv.getContext('2d');

  // Black epoxy base
  g.fillStyle = '#0a0a0c';
  g.fillRect(0, 0, SW, SH);

  // Subtle mold texture
  for (let i = 0; i < 5000; i++) {
    g.fillStyle = `rgba(255,255,255,${Math.random() * 0.016})`;
    g.fillRect(Math.random() * SW, Math.random() * SH, 1, 1);
  }

  // Pin 1 chamfer indicator — bottom-left corner
  g.fillStyle = '#1e1e22';
  g.beginPath(); g.moveTo(0,0); g.lineTo(56,0); g.lineTo(0,56); g.closePath(); g.fill();
  g.fillStyle = '#484850';
  g.beginPath(); g.arc(22, 22, 7, 0, Math.PI*2); g.fill();

  // Company name — small, laser gray
  g.textAlign = 'center';
  g.font = '500 26px Arial, sans-serif';
  g.fillStyle = '#42424a';
  g.fillText('Waals Nanotechnologies', SW / 2, 88);

  // Product name — dominant center
  g.font = 'bold 54px Arial Black, Arial, sans-serif';
  g.fillStyle = '#68686f';
  g.fillText('VIBROSENSE', SW / 2, 290);

  // Thin rule
  g.strokeStyle = '#28282e'; g.lineWidth = 1.2;
  g.beginPath(); g.moveTo(72, 332); g.lineTo(SW - 72, 332); g.stroke();

  // Date / lot code
  g.font = '500 22px Courier New, monospace';
  g.fillStyle = '#323238';
  g.fillText('2407  A3F  SKY130A', SW / 2, 366);

  // Compliance
  g.font = '18px Arial, sans-serif';
  g.fillStyle = '#28282e';
  g.fillText('TSSOP-16  ·  1.8 V  ·  RoHS', SW / 2, 398);

  return cv;
}

const markCv  = buildMarking();
const markTex = new THREE.CanvasTexture(markCv);
markTex.colorSpace = THREE.SRGBColorSpace;
markTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

// Fit label to top face (PKG_X × PKG_Z) with slight inset
const markMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(PKG_X - 0.025, PKG_Z - 0.025),
  new THREE.MeshStandardMaterial({
    map:             markTex,
    metalness:       0.0,
    roughness:       0.88,
    envMapIntensity: 0.06,
  })
);
markMesh.rotation.x = -Math.PI / 2;
markMesh.position.y  = PKG_Y + 0.001;
group.add(markMesh);

// ─── Floor ────────────────────────────────────────────────────────────────────
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 12),
  new THREE.MeshStandardMaterial({ color: new THREE.Color(0.04, 0.06, 0.04), roughness: 0.92 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.056;
floor.receiveShadow = true; scene.add(floor);

// ─── Vignette ─────────────────────────────────────────────────────────────────
const vig = document.createElement('div');
vig.style.cssText = 'position:absolute;inset:0;pointer-events:none;' +
  'background:radial-gradient(ellipse at 50% 48%,transparent 28%,rgba(2,4,2,0.80) 100%)';
document.body.appendChild(vig);

// ─── Animate ──────────────────────────────────────────────────────────────────
const BASE = -0.42;
let autoSpin = true, lastT = 0;
controls.addEventListener('start', () => { autoSpin = false; lastT = Date.now(); });
controls.addEventListener('end',   () => { lastT = Date.now(); });
const clock = new THREE.Clock();

(function loop() {
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  if (!autoSpin && Date.now() - lastT > 3500) autoSpin = true;
  if (autoSpin) world.rotation.y = BASE + Math.sin(t * 0.18) * 0.07;
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
